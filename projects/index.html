<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Coming Soon</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Inter", sans-serif;
      overflow: hidden;
      text-align: center;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 25px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .logo {
      font-size: 1.2rem;
      opacity: 0.9;
      white-space: nowrap;
    }

    nav {
      display: flex;
      gap: 20px;
      white-space: nowrap;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.85;
      transition: 0.2s;
    }

    nav a:hover { opacity: 1; }

    /* CENTERED CONTENT */
    .main {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 40px;
    }

    .coming {
      font-size: 3rem;
      font-weight: 700;
      opacity: 0;
    }

    .sub {
      margin-top: 15px;
      font-size: 1.2rem;
      opacity: 0.6;
      opacity: 0;
    }

    /* PARTICLES */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ffffff40;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(1px);
    }
  </style>
</head>

<body>

<header>
  <div class="logo">pausuu.xyz</div>
  <nav>
    <a href="/">Home</a>
    <a href="/projects">Projects</a>
  </nav>
</header>

<div class="main">
  <div>
    <div class="coming" id="comingText">Coming Soon</div>
    <div class="sub" id="subText">Projects are on the way</div>
  </div>
</div>

<script>
  /* Fade-in animations */
  gsap.to("#comingText", { opacity: 1, y: -10, duration: 1.2, ease: "power3.out" });
  gsap.to("#subText", { opacity: 1, y: -5, duration: 1.2, delay: 0.3, ease: "power3.out" });

  /* Particle effect */
  const comingEl = document.getElementById("comingText");

  function createParticleAround(el) {
    const rect = el.getBoundingClientRect();
    const particle = document.createElement("div");
    particle.classList.add("particle");

    const size = Math.random() * 6 + 3;
    particle.style.width = size + "px";
    particle.style.height = size + "px";

    const x = rect.left + rect.width / 2 + (Math.random() - 0.5) * rect.width;
    const y = rect.top + window.scrollY + (Math.random() - 0.5) * rect.height;

    particle.style.left = x + "px";
    particle.style.top = y + "px";

    document.body.appendChild(particle);

    gsap.to(particle, {
      opacity: 0,
      y: -40,
      x: (Math.random() - 0.5) * 80,
      duration: 1.5,
      ease: "power1.out",
      onComplete: () => particle.remove(),
    });
  }

  setInterval(() => {
    createParticleAround(comingEl);
  }, 220);
</script>

</body>
</html>
