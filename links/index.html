<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links – Pausuu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 20px;
    }

    nav {
      position: fixed;
      top: 20px;
      right: 25px;
      display: flex;
      gap: 25px;
      z-index: 10;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      opacity: 0.85;
      transition: 0.2s ease;
      border-bottom: 1px solid transparent;
    }

    nav a:hover {
      opacity: 1;
      border-bottom: 1px solid #ffffff60;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 40px;
      text-align: center;
    }

    .links-row {
      display: flex;
      gap: 35px;
      align-items: center;
      justify-content: center;
    }

    .link-icon {
      width: 55px;
      height: 55px;
      opacity: 0.85;
      transition: 0.25s ease;
    }

    .link-icon:hover {
      opacity: 1;
      transform: translateY(-6px);
    }
  </style>
</head>

<body>

  <nav>
    <a href="/">Home</a>
    <a href="/contact">Contact</a>
    <a href="/links">Links</a>
    <a href="/credits">Credits</a>
  </nav>

  <h1>My Links</h1>

  <div class="links-row">
    <a href="https://youtube.com/@pausuu" target="_blank">
      <img class="link-icon" src="https://cdn.simpleicons.org/youtube/ffffff" alt="YouTube">
    </a>

    <a href="https://twitter.com/pausuu" target="_blank">
      <img class="link-icon" src="https://cdn.simpleicons.org/x/ffffff" alt="Twitter">
    </a>

    <a href="https://tiktok.com/@pausuu" target="_blank">
      <img class="link-icon" src="https://cdn.simpleicons.org/tiktok/ffffff" alt="TikTok">
    </a>

    <a href="https://twitch.tv/pausuu" target="_blank">
      <img class="link-icon" src="https://cdn.simpleicons.org/twitch/ffffff" alt="Twitch">
    </a>

    <a href="https://discord.com/users/yourid" target="_blank">
      <img class="link-icon" src="https://cdn.simpleicons.org/discord/ffffff" alt="Discord">
    </a>

    <a href="https://github.com/pausuu1" target="_blank">
      <img class="link-icon" src="https://cdn.simpleicons.org/github/ffffff" alt="GitHub">
    </a>
  </div>

</body>
</html>
