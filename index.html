<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon – Pausuu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    /* ZOOM ANIMATION */
    @keyframes zoomPulse {
      0% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 0.85; }
    }

    .container {
      animation: zoomPulse 3s ease-in-out infinite;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
      max-width: 600px;
      line-height: 1.5;
    }

    /* AUDIO CONTROLS */
    .audio-controls {
      position: fixed;
      bottom: 25px;
      right: 25px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #ffffff10;
      border: 1px solid #ffffff20;
      padding: 10px 14px;
      border-radius: 8px;
      backdrop-filter: blur(6px);
    }

    .audio-controls button {
      background: #ffffff15;
      border: 1px solid #ffffff30;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .audio-controls button:hover {
      background: #ffffff25;
      border-color: #ffffff50;
    }

    .audio-controls input[type="range"] {
      width: 120px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Coming Soon</h1>
    <p>The site is currently being built. Check back soon.</p>
  </div>

  <!-- AUDIO ELEMENT -->
  <audio id="bgMusic" loop></audio>

  <!-- AUDIO CONTROLS -->
  <div class="audio-controls">
    <button id="muteBtn">Mute</button>
    <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.5">
  </div>

  <script>
    // SONG LIST
    const songs = [
      "/music/song-one.mp3",
      "/music/song-two.mp3",
      "/music/song-three.mp3"
    ];

    // PICK RANDOM SONG
    const randomSong = songs[Math.floor(Math.random() * songs.length)];

    const music = document.getElementById("bgMusic");
    const muteBtn = document.getElementById("muteBtn");
    const volumeSlider = document.getElementById("volumeSlider");

    // LOAD RANDOM SONG
    music.src = randomSong;
    music.volume = 0.5;

    // TRY TO AUTOPLAY (may require user interaction)
    music.play().catch(() => {
      console.log("Autoplay blocked until user interacts.");
    });

    // MUTE BUTTON
    muteBtn.onclick = () => {
      music.muted = !music.muted;
      muteBtn.textContent = music.muted ? "Unmute" : "Mute";
    };

    // VOLUME SLIDER
    volumeSlider.oninput = () => {
      music.volume = volumeSlider.value;
    };
  </script>

</body>
</html>
