<style>
    body {
        margin: 0;
        font-family: 'Space Grotesk', sans-serif;
        background-color: #0a0a0a;
        color: #eaeaea;
        overflow-x: hidden;
    }

    /* Softer glow */
    .glow {
        text-shadow: 0 0 6px #FF3B3B;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 25px 50px;
    }

    .logo {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #FF3B3B;
    }

    nav a {
        margin-left: 25px;
        text-decoration: none;
        color: #eaeaea;
        font-weight: 500;
        transition: 0.3s;
        cursor: pointer;
    }

    nav a:hover {
        color: #FF3B3B;
    }

    /* Sections */
    .section {
        display: none;
        padding: 60px 50px; /* reduced from 80px */
        animation: fade 0.3s ease-in-out;
    }

    .active {
        display: block;
    }

    @keyframes fade {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Hero */
    .hero h1 {
        font-size: 80px;
        margin: 0;
        color: #ffffff;
    }

    .hero p {
        font-size: 22px;
        max-width: 600px;
        margin-top: 15px;
        color: #bdbdbd;
    }

    .buttons {
        margin-top: 30px; /* reduced */
    }

    .buttons a {
        display: inline-block;
        padding: 12px 28px;
        margin-right: 15px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
        cursor: pointer;
    }

    .btn-primary {
        background-color: #FF3B3B;
        color: #0a0a0a;
        box-shadow: 0 0 6px #FF3B3B; /* softer */
    }

    .btn-primary:hover {
        background-color: #ff6b6b;
    }

    .btn-outline {
        border: 2px solid #FF3B3B;
        color: #FF3B3B;
    }

    .btn-outline:hover {
        background-color: #FF3B3B;
        color: #0a0a0a;
    }

    /* Social icons */
    .socials a {
        margin-right: 20px;
        color: #bdbdbd;
        font-size: 22px;
        text-decoration: none;
        transition: 0.3s;
    }

    .socials a:hover {
        color: #FF3B3B;
        text-shadow: 0 0 6px #FF3B3B; /* softer */
    }

    /* Footer */
    footer {
        text-align: center;
        padding: 25px;
        margin-top: 40px;
        color: #bdbdbd;
        background: #0d0d0d;
        font-size: 14px;
    }
</style>
