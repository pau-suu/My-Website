<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon – Pausuu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    /* ZOOM ANIMATION */
    @keyframes zoomPulse {
      0% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 0.85; }
    }

    .container {
      animation: zoomPulse 3s ease-in-out infinite;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
      max-width: 600px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Coming Soon</h1>
    <p>The site is currently being built. Check back soon.</p>
  </div>

</body>
</html>
